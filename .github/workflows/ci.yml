name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-ci.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+-ci.[0-9]+'
  # CI pipeline for tagged releases: Fast unit tests + Docker build + SDK tests
  # Note: Comprehensive tests (including Slow + Integration) run in nightly.yml
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: false
        type: boolean
      debug_mode:
        description: 'Enable debug mode'
        required: false
        default: false
        type: boolean

env:
  IMAGE_NAME: browser4
  NETWORK_NAME: 'browser4_backend'
  CONTAINER_NAME: 'browser4-test'
  DOCKER_COMPOSE_FILE: './docker-compose.yml'
  DEPENDENCY_SERVICES: 'mongodb'
  MONGODB_CONTAINER: 'mongodb'
  MONGODB_PORT: '27017'
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx3g -XX:+UseG1GC'

jobs:
  ci-build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
      test_results: ${{ steps.tests.outputs.test_status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          java_version: ${{ env.JAVA_VERSION }}

      - name: Verify Dependencies
        id: deps
        uses: ./.github/actions/verify-dependencies
        with:
          network_name: ${{ env.NETWORK_NAME }}
          compose_file: ${{ env.DOCKER_COMPOSE_FILE }}
          services_to_start: ${{ env.DEPENDENCY_SERVICES }}
          mongodb_container: ${{ env.MONGODB_CONTAINER }}
          mongodb_port: ${{ env.MONGODB_PORT }}
          startup_timeout: '120'
          verify_network_connectivity: 'true'

      - name: Maven Build
        id: build-maven
        uses: ./.github/actions/maven-build
        with:
          skip_tests: ${{ inputs.skip_tests || 'true' }}
          timeout_minutes: '15'
          maven_profiles: 'all-modules'

      - name: Run Tests
        id: run-tests
        if: inputs.skip_tests != true # Temporarily disable tests in CI pipeline
        uses: ./.github/actions/run-tests
        with:
          maven_profiles: 'all-modules'
          # CI Pipeline: Run only Fast unit tests (same as PR tests)
          # Comprehensive tests (Slow + Integration) run in nightly.yml
          # Exclude: Slow, Heavy, Integration, E2E, SDK, and all environment-dependent tests
          excluded_groups: 'Slow,Heavy,RequiresServer,RequiresBrowser,RequiresAI,RequiresDocker,Integration,E2E,SDK,ManualOnly,IntegrationTest,E2ETest,HeavyTest,SkippableLowerLevelTest,TestInfraCheck,OptionalTest'
          timeout_minutes: '35'

      - name: Check Test Status
        if: always() && inputs.skip_tests != true # Temporarily disable tests in CI pipeline
        shell: bash
        run: |
          test_status="${{ steps.run-tests.outputs.test_status }}"
          test_status="${test_status:-failed}"

          if [ "$test_status" != "success" ]; then
            echo "❌ Tests failed with status: $test_status"
            echo "📊 Test Results:"
            echo "  - Total Tests: ${{ steps.run-tests.outputs.test_count }}"
            echo "  - Failed Tests: ${{ steps.run-tests.outputs.failed_count }}"
            echo "  - Passed Tests: ${{ steps.run-tests.outputs.passed_count }}"
            echo "  - Skipped Tests: ${{ steps.run-tests.outputs.skipped_count }}"
            echo ""
            echo "🔎 Failed test cases:"

            python3 <<'PY'
            import os
            import xml.etree.ElementTree as ET
            from pathlib import Path

            report_files = sorted(Path(".").glob("**/TEST-*.xml"))
            failures = []

            for report_file in report_files:
                try:
                    root = ET.parse(report_file).getroot()
                except ET.ParseError as exc:
                    print(f"::warning file={report_file}::Unable to parse test report: {exc}")
                    continue

                for case in root.findall(".//testcase"):
                    failed_nodes = [node for tag in ("failure", "error") for node in case.findall(tag)]
                    if not failed_nodes:
                        continue

                    classname = (
                        case.attrib.get("classname")
                        or case.attrib.get("className")
                        or root.attrib.get("name")
                        or report_file.stem.removeprefix("TEST-")
                    )
                    name = case.attrib.get("name", "<unknown>")
                    duration = case.attrib.get("time")

                    for node in failed_nodes:
                        raw_message = (node.attrib.get("message") or node.text or "").strip()
                        message = raw_message.splitlines()[0] if raw_message else "No details provided"
                        failures.append((str(report_file), classname, name, node.tag, message, duration))

            if not failures:
                print("  - No per-test failure details were found in TEST-*.xml reports.")
            else:
                for report_file, classname, name, failure_type, message, duration in failures[:50]:
                    duration_suffix = f" ({duration}s)" if duration else ""
                    print(f"  - {classname}#{name}{duration_suffix}: {message}")

                    escaped_message = (
                        f"{failure_type}: {message}"
                        .replace("%", "%25")
                        .replace("\r", "%0D")
                        .replace("\n", "%0A")
                    )
                    print(f"::error file={report_file},title={classname}#{name}::{escaped_message}")

                remaining = len(failures) - 50
                if remaining > 0:
                    print(f"  - ... and {remaining} more failing test case(s)")

                summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
                if summary_path:
                    with open(summary_path, "a", encoding="utf-8") as summary:
                        summary.write("### ❌ Failed test cases\n\n")
                        for _, classname, name, failure_type, message, duration in failures[:20]:
                            duration_suffix = f" ({duration}s)" if duration else ""
                            summary.write(
                                f"- `{classname}#{name}`{duration_suffix} - **{failure_type}**: {message}\n"
                            )
                        if len(failures) > 20:
                            summary.write(f"- ... and {len(failures) - 20} more failing test case(s)\n")
                        summary.write("\n")
            PY

            exit 1
          else
            echo "✅ All tests passed successfully"
            echo "📊 Test Results: ${{ steps.run-tests.outputs.passed_count }} tests passed"
          fi

      - name: Setup Rust Toolchain
        id: rust-setup
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/browser4-cli

      - name: Cleanup Docker system to free space
        run: |
          docker system prune -af
          docker volume prune -f
          rm -rf ~/.m2/repository  # If you no longer need Maven cache
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo df -h

      - name: Build Docker Image
        id: build
        uses: ./.github/actions/docker-build
        with:
          image_name: ${{ env.IMAGE_NAME }}
          version: ${{ github.sha }}
          timeout_minutes: '20'

      - name: Start Application
        id: app
        uses: ./.github/actions/start-application
        with:
          image_name: ${{ env.IMAGE_NAME }}
          version: ${{ github.sha }}
          container_name: ${{ env.CONTAINER_NAME }}
          network_name: ${{ env.NETWORK_NAME }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          proxy_rotation_url: ${{ secrets.PROXY_ROTATION_URL }}

      - name: Health Check
        id: health
        uses: ./.github/actions/health-check
        with:
          service_port: '8182'
          timeout_minutes: '5'
          container_name: ${{ env.CONTAINER_NAME }}

      - name: Run browser4-cli E2E Tests
        id: e2e-cli
        timeout-minutes: 15
        shell: bash
        env:
          BROWSER4_E2E_SERVICE_URL: http://localhost:8182
          BROWSER4_E2E_FIXTURE_HOST: host.docker.internal
        run: |
          echo "::group::🧪 browser4-cli E2E Tests"

          # Run the CLI tests against the already-running Docker container
          echo "Running browser4-cli E2E tests..."
          echo "Working directory: $(pwd)"
          cd sdks/browser4-cli
          cargo test --test e2e -- --nocapture
          cd "$(git rev-parse --show-toplevel)"

          echo "::endgroup::"

      - name: Pipeline Summary
        if: always()
        shell: bash
        run: |
          echo "::group::📊 Pipeline Summary"

          echo "🎯 Pipeline Results:"
          echo "  - Setup: ${{ steps.setup.outcome }}"
          echo "  - Dependencies: ${{ steps.deps.outcome }}"
          echo "  - Maven Build: ${{ steps.build-maven.outcome }}"
          echo "  - Unit Tests: ${{ steps.run-tests.outcome || 'skipped' }}"
          echo "  - Docker Build: ${{ steps.build.outcome }}"
          echo "  - Application: ${{ steps.app.outcome }}"
          echo "  - Health Check: ${{ steps.health.outcome }}"
          echo "  - CLI E2E Tests: ${{ steps.e2e-cli.outcome }}"

          echo ""
          echo "🌐 Infrastructure:"
          echo "  - Network: ${{ env.NETWORK_NAME }}"
          echo "  - Container: ${{ env.CONTAINER_NAME }}"
          echo "  - Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  - MongoDB: ${{ steps.deps.outputs.mongodb_status }}"
          echo "  - Redis: ${{ steps.deps.outputs.redis_status }}"

          echo ""
          echo "📅 Completed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "🌟 Commit: ${{ github.sha }}"

          echo "::endgroup::"

      - name: Cleanup Resources
        if: always()
        uses: ./.github/actions/cleanup-resources
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          cleanup_compose: 'true'
          cleanup_volumes: 'true'
          network_name: ${{ env.NETWORK_NAME }}
