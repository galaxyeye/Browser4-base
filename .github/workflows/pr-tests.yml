name: Pull Request Tests

on:
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - '**/*.java'
      - '**/*.kt'
      - '**/pom.xml'
      - '.github/workflows/pr-tests.yml'
      - '.github/actions/run-tests/**'

# Minimal permissions for security
permissions:
  contents: read
  actions: read

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx3g -XX:+UseG1GC'

jobs:
  unit-tests:
    name: Fast Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          java_version: ${{ env.JAVA_VERSION }}

      - name: Run Fast Unit Tests
        id: unit-tests
        uses: ./.github/actions/run-tests
        with:
          # PR tests: Fast unit tests only (test-strategy.md)
          # Exclude: Integration, E2E, SDK, Heavy, Slow, all environment-dependent tests
          excluded_groups: 'Integration,E2E,SDK,Heavy,Slow,RequiresServer,RequiresBrowser,RequiresAI,RequiresDocker,MustRunExplicitly,IntegrationTest,E2ETest,HeavyTest,TimeConsumingTest,ExternalServiceTest'
          timeout_minutes: '15'
          test_reports: 'true'

      - name: Check Unit Test Status
        run: |
          if [ "${{ steps.unit-tests.outputs.test_status }}" != "success" ]; then
            echo "❌ Unit tests failed"
            echo "📊 Results: ${{ steps.unit-tests.outputs.failed_count }} failed out of ${{ steps.unit-tests.outputs.test_count }} tests"
            exit 1
          else
            echo "✅ All ${{ steps.unit-tests.outputs.passed_count }} unit tests passed"
          fi

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: always()
    permissions:
      contents: read
    
    steps:
      - name: Summary
        run: |
          echo "## PR Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scope:** Fast unit tests only (Integration & E2E tests run in nightly builds)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Fast Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All PR tests passed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Tests failed. Please review the logs.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
