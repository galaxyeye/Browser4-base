name: Run Python SDK Tests
description: Execute Python SDK integration tests against a running Browser4 instance
author: platonai
branding:
  icon: 'code'
  color: 'yellow'

inputs:
  network_name:
    description: 'Docker network name to find gateway IP'
    required: true
  sdk_directory:
    description: 'Path to Python SDK directory'
    required: false
    default: 'sdks/browser4-sdk-python'
  mock_server_port:
    description: 'Port for the mock server'
    required: false
    default: '18080'

runs:
  using: "composite"
  steps:
    - name: Setup uv
      shell: bash
      run: |
        echo "::group::🐍 Setup Python environment"
        if ! command -v uv &> /dev/null; then
            echo "Installing uv..."
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        else
            echo "uv is already installed"
        fi
        echo "::endgroup::"

    - name: Run Integration Tests
      shell: bash
      run: |
        echo "::group::🧪 Run Python Integration Tests"
        
        # Add cargo bin to path for this step explicitly, as GITHUB_PATH changes take effect in next step
        export PATH="$HOME/.cargo/bin:$PATH"

        if [ ! -d "${{ inputs.sdk_directory }}" ]; then
            echo "❌ SDK directory not found: ${{ inputs.sdk_directory }}"
            exit 1
        fi

        cd "${{ inputs.sdk_directory }}"
        
        echo "Determining Docker Gateway IP for network: ${{ inputs.network_name }}"
        # Extract the first gateway IP found
        GATEWAY_IP=$(docker network inspect ${{ inputs.network_name }} --format '{{range .IPAM.Config}}{{.Gateway}} {{end}}' | awk '{print $1}')
        
        if [ -z "$GATEWAY_IP" ]; then
            echo "❌ Failed to determine Gateway IP"
            exit 1
        fi
        
        echo "Docker Gateway IP: $GATEWAY_IP"
        
        # Set environment variable for the test process
        export MOCK_SERVER_BASE="http://$GATEWAY_IP:${{ inputs.mock_server_port }}"
        echo "Configuration:"
        echo "  - SDK Directory: ${{ inputs.sdk_directory }}"
        echo "  - Mock Server: $MOCK_SERVER_BASE"
        
        echo "Syncing dependencies..."
        uv sync --extra dev
        
        echo "Running pytest..."
        uv run pytest -m integration -v -s
        
        echo "::endgroup::"
